description: >
  Behavior-constraint plugin that enforces a 7-rung decision ladder
  (YAGNI → stdlib → platform → existing dep → one-liner → minimal code)
  to eliminate over-engineering. Inspired by DietrichGebert/ponytail.
huginn_version_range: ">=0.1.0"
