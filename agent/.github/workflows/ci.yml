name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HUGINN_PROMPT_CACHE_CONTROL: "0"
  HUGINN_ALLOW_LOCAL_BASH: "1"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libopenmpi-dev curl

      - name: Install Lean 4 (elan)
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Install conda for simulation tools
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: ${{ matrix.python-version }}
          channels: conda-forge

      - name: Install LAMMPS and Quantum ESPRESSO via conda
        shell: bash -el {0}
        run: |
          conda install -y lammps qe
          echo "LAMMPS_EXECUTABLE=$(which lmp)" >> $GITHUB_ENV
          echo "QE_EXECUTABLE=$(which pw.x)" >> $GITHUB_ENV

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv pip install -e ".[dev,all]"

      - name: Verify Lean installation
        run: |
          elan --version
          lake --version

      - name: Lint with ruff
        run: ruff check huginn tests

      - name: Check formatting with black
        run: black --check huginn tests

      - name: Type check with mypy
        run: mypy huginn
        continue-on-error: true

      - name: Dependency vulnerability scan
        run: |
          uv pip install pip-audit
          pip-audit --desc || true

      - name: Test with pytest and coverage
        run: python -m pytest tests -q --cov=huginn --cov-report=xml --cov-fail-under=60

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
