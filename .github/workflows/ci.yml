name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "./agent[dev]"
          pip install chromadb scikit-learn scipy sympy matplotlib sentence-transformers pymupdf
          pip install pymatgen ase paramiko PyPDF2 pint spglib
          pip install toml croniter fastapi uvicorn
          pip install langchain-openai langgraph-checkpoint-sqlite
          # Lightweight optional deps — keeps test coverage up on CI
          pip install psutil pulp cvxpy scikit-fem anthropic langchain-ollama

      - name: Run tests
        env:
          HUGINN_RATE_LIMIT_ENABLED: "false"
        run: |
          cd agent
          # CI can't install heavy deps (torch, jax, easyocr, dscribe, gpytorch).
          # Coverage is reported but not gated — threshold enforced locally
          # where all optional deps are installed.
          pytest -q --cov=huginn --cov-report=term-missing --cov-fail-under=0
