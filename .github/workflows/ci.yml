name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "./agent[dev]"
          pip install chromadb scikit-learn scipy sympy matplotlib sentence-transformers pymupdf
          pip install pymatgen ase paramiko pypdf pint spglib
          pip install toml croniter fastapi uvicorn nbformat
          pip install langchain-openai langgraph-checkpoint-sqlite
          # Lightweight optional deps — keeps test coverage up on CI
          pip install psutil pulp cvxpy scikit-fem anthropic langchain-ollama
          pip install pytest-timeout

      - name: Run tests
        env:
          HUGINN_RATE_LIMIT_ENABLED: "false"
          HUGINN_RATE_LIMIT_PER_MINUTE: "0"
          HF_HUB_OFFLINE: "1"
          TRANSFORMERS_OFFLINE: "1"
        run: |
          cd agent
          python -m pytest -q --cov-fail-under=40 --timeout=120 -m "not network" \
            --ignore=tests/test_api_contract.py \
            --ignore=tests/test_security_penetration.py \
            --ignore=tests/test_chaos_engineering.py \
            --ignore=tests/stress \
            --tb=short --maxfail=5 2>&1 | tee pytest_output.txt
          exit ${PIPESTATUS[0]}

      - name: Expose failures to step summary
        if: failure()
        working-directory: ${{ github.workspace }}
        run: |
          if [ -f agent/pytest_output.txt ]; then
            {
              echo '## pytest failures (last 150 lines)'
              echo '```'
              tail -150 agent/pytest_output.txt
              echo '```'
            } >> $GITHUB_STEP_SUMMARY
            # also emit as error annotations (public via API)
            grep -E '^FAILED' agent/pytest_output.txt | head -20 | while IFS= read -r line; do
              echo "::error file=pytest::${line}"
            done
          else
            echo "::error::pytest_output.txt not found"
          fi

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-output-${{ matrix.python-version }}
          path: agent/pytest_output.txt
          retention-days: 7

  # ponytail: 3 个集成测试文件原本串行跑, 单 job 30 分钟必超时
  # (最近 30+ 次 CI run 全部 fail/cancel). 拆成 matrix 并行,
  # test_api_contract 有 620+ parametrize 用例 (每个路由 hit 1-2 次),
  # 需要 30 分钟; security/chaos 几分钟就够.
  # 单测 timeout 60s 防止个别端点卡住拖整个 job.
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.job-timeout }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - test-file: tests/test_api_contract.py
            label: api-contract
            job-timeout: 30
            test-timeout: 60
          - test-file: tests/test_security_penetration.py
            label: security-penetration
            job-timeout: 20
            test-timeout: 120
          - test-file: tests/test_chaos_engineering.py
            label: chaos-engineering
            job-timeout: 20
            test-timeout: 120
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "./agent[dev]"
          pip install chromadb scikit-learn scipy sympy matplotlib sentence-transformers pymupdf
          pip install pymatgen ase paramiko pypdf pint spglib
          pip install toml croniter fastapi uvicorn nbformat
          pip install langchain-openai langgraph-checkpoint-sqlite
          pip install psutil pulp cvxpy scikit-fem anthropic langchain-ollama
          pip install pytest-timeout

      - name: Run integration tests
        env:
          HUGINN_RATE_LIMIT_ENABLED: "false"
          HUGINN_RATE_LIMIT_PER_MINUTE: "0"
          HF_HUB_OFFLINE: "1"
          TRANSFORMERS_OFFLINE: "1"
        run: |
          cd agent
          pytest ${{ matrix.test-file }} -v --no-cov -m "integration and not network" --tb=short --timeout=${{ matrix.test-timeout }} 2>&1 | tee pytest_integration_output.txt
          exit ${PIPESTATUS[0]}

      - name: Upload integration test output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-integration-${{ matrix.label }}
          path: agent/pytest_integration_output.txt
          retention-days: 7

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install and build
        run: |
          cd desktop
          npm ci
          npm run build

  security-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install agent
        run: |
          python -m pip install --upgrade pip
          pip install -e "./agent[dev]"

      - name: Policy engine self-check
        run: |
          cd agent
          python -m huginn.security.policy_engine

      - name: Dependency vulnerability scan
        run: |
          pip install pip-audit
          # Informational — doesn't fail the build
          pip-audit || true

  # G25: Rust 编译门禁 — 防止 main.rs / Cargo 改动破坏桌面端编译
  # 当前无 Rust 测试代码, cargo check 确保至少能编译通过
  rust-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Cargo check
        working-directory: desktop/src-tauri
        run: cargo check --workspace

      - name: Cargo test
        working-directory: desktop/src-tauri
        run: cargo test --workspace
