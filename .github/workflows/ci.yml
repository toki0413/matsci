name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "./agent[dev]"
          pip install chromadb scikit-learn scipy sympy matplotlib sentence-transformers pymupdf
          pip install pymatgen ase paramiko PyPDF2 pint spglib
          pip install toml croniter fastapi uvicorn
          pip install langchain-openai langgraph-checkpoint-sqlite
          # Lightweight optional deps — keeps test coverage up on CI
          pip install psutil pulp cvxpy scikit-fem anthropic langchain-ollama
          pip install pytest-timeout

      - name: Run tests
        env:
          HUGINN_RATE_LIMIT_ENABLED: "false"
          HUGINN_RATE_LIMIT_PER_MINUTE: "0"
        run: |
          cd agent
          python -m pytest -q --cov-fail-under=0 --timeout=120 \
            --ignore=tests/test_api_contract.py \
            --ignore=tests/test_security_penetration.py \
            --ignore=tests/test_chaos_engineering.py \
            --ignore=tests/stress

  # ponytail: 3 个集成测试文件原本串行跑, 单 job 30 分钟必超时
  # (最近 30+ 次 CI run 全部 fail/cancel). 拆成 matrix 并行,
  # 每个文件独立计时, 单测 timeout 从 300s 降到 120s (5 分钟对单测太长)
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        test-file:
          - tests/test_api_contract.py
          - tests/test_security_penetration.py
          - tests/test_chaos_engineering.py
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "./agent[dev]"
          pip install chromadb scikit-learn scipy sympy matplotlib sentence-transformers pymupdf
          pip install pymatgen ase paramiko PyPDF2 pint spglib
          pip install toml croniter fastapi uvicorn
          pip install langchain-openai langgraph-checkpoint-sqlite
          pip install psutil pulp cvxpy scikit-fem anthropic langchain-ollama
          pip install pytest-timeout

      - name: Run integration tests
        env:
          HUGINN_RATE_LIMIT_ENABLED: "false"
          HUGINN_RATE_LIMIT_PER_MINUTE: "0"
        run: |
          cd agent
          pytest ${{ matrix.test-file }} -v --no-cov -m "integration" --tb=short --timeout=120

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install and build
        run: |
          cd desktop
          npm ci
          npm run build

  security-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install agent
        run: |
          python -m pip install --upgrade pip
          pip install -e "./agent[dev]"

      - name: Policy engine self-check
        run: |
          cd agent
          python -m huginn.security.policy_engine

      - name: Dependency vulnerability scan
        run: |
          pip install pip-audit
          # Informational — doesn't fail the build
          pip-audit || true
