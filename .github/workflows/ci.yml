name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "./agent[dev]"
          pip install chromadb scikit-learn scipy sympy matplotlib sentence-transformers pymupdf
          pip install pymatgen ase paramiko PyPDF2 pint spglib
          pip install toml croniter fastapi uvicorn
          pip install langchain-openai langgraph-checkpoint-sqlite
          # Lightweight optional deps — keeps test coverage up on CI
          pip install psutil pulp cvxpy scikit-fem anthropic langchain-ollama
          pip install pytest-timeout

      - name: Run tests
        env:
          HUGINN_RATE_LIMIT_ENABLED: "false"
          HUGINN_RATE_LIMIT_PER_MINUTE: "0"
        run: |
          cd agent
          pytest -q --cov-fail-under=0 -m "not integration" --timeout=120

  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "./agent[dev]"
          pip install chromadb scikit-learn scipy sympy matplotlib sentence-transformers pymupdf
          pip install pymatgen ase paramiko PyPDF2 pint spglib
          pip install toml croniter fastapi uvicorn
          pip install langchain-openai langgraph-checkpoint-sqlite
          pip install psutil pulp cvxpy scikit-fem anthropic langchain-ollama
          pip install pytest-timeout

      - name: Run integration tests
        env:
          HUGINN_RATE_LIMIT_ENABLED: "false"
          HUGINN_RATE_LIMIT_PER_MINUTE: "0"
        run: |
          cd agent
          pytest tests/test_api_contract.py tests/test_security_penetration.py tests/test_chaos_engineering.py -v --no-cov -m "integration" --tb=short --timeout=300
