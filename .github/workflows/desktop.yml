name: Desktop Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0

jobs:
  build-desktop:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./desktop/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        shell: bash
        run: pip install maturin

      - name: Build Rust CLI + sidecar
        shell: bash
        run: |
          set -o pipefail
          cargo build --release -p matsci -p matsci-sidecar 2>&1 | tee rust-build.log

      - name: Build matsci-ext wheel
        shell: bash
        run: |
          cd pyext
          maturin build --release
          mkdir -p ../dist
          cp ../target/wheels/*.whl ../dist/ || cp target/wheels/*.whl ../dist/

      - name: Detect Rust target triple
        id: target
        shell: bash
        run: |
          TARGET=$(rustc --print host-tuple)
          echo "triple=$TARGET" >> "$GITHUB_OUTPUT"

      - name: Stage matsci sidecars
        shell: bash
        run: |
          TARGET=${{ steps.target.outputs.triple }}
          SIDECAR_DIR="desktop/src-tauri/sidecars"
          mkdir -p "$SIDECAR_DIR"
          cp "target/release/matsci.exe" "$SIDECAR_DIR/matsci-$TARGET.exe"
          cp "target/release/matsci-sidecar.exe" "$SIDECAR_DIR/matsci-sidecar-$TARGET.exe"

      - name: Install frontend dependencies
        working-directory: ./desktop
        run: npm ci

      - name: Type-check frontend
        working-directory: ./desktop
        run: npm run build

      - name: Build Tauri desktop app
        working-directory: ./desktop
        shell: bash
        run: |
          set -o pipefail
          npm run tauri build 2>&1 | tee tauri-build.log
        timeout-minutes: 40

      - name: Annotate build failure
        if: failure()
        shell: bash
        run: |
          echo "::error::Build failed. Relevant error context:"
          for log in rust-build.log desktop/tauri-build.log; do
            if [ -f "$log" ]; then
              echo "::error::--- $log ---"
              grep -n -E -B3 -A5 "error\[|failed to run custom build|failed to build app|failed to compile" "$log" | tail -100 | while IFS= read -r line; do
                echo "::error::$line"
              done
            fi
          done

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            rust-build.log
            desktop/tauri-build.log

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: matsci-desktop-windows
          path: |
            target/release/bundle/
            target/release/*.exe
            dist/*.whl

      - name: Create pre-release with desktop installer
        if: success() && github.event_name == 'push'
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-ci-${{ github.run_number }}
          name: Desktop CI Build ${{ github.run_number }}
          prerelease: true
          files: |
            target/release/bundle/**/*.exe
            target/release/bundle/**/*.msi
            target/release/*.exe
            dist/*.whl

      - name: Print release URL
        if: success() && github.event_name == 'push'
        run: |
          echo "::notice::Release URL: ${{ steps.release.outputs.url }}"
          echo "::notice::Release assets: ${{ steps.release.outputs.assets }}"
