name: Desktop Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0

jobs:
  build-desktop:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./desktop/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust CLI + sidecar
        shell: bash
        run: |
          set -o pipefail
          cargo build --release -p huginn -p huginn-sidecar 2>&1 | tee rust-build.log

      - name: Detect Rust target triple
        id: target
        shell: bash
        run: |
          TARGET=$(rustc --print host-tuple)
          echo "triple=$TARGET" >> "$GITHUB_OUTPUT"

      - name: Stage huginn sidecars
        shell: bash
        run: |
          TARGET=${{ steps.target.outputs.triple }}
          SIDECAR_DIR="desktop/src-tauri/sidecars"
          mkdir -p "$SIDECAR_DIR"
          cp "target/release/huginn.exe" "$SIDECAR_DIR/huginn-$TARGET.exe"
          cp "target/release/huginn-sidecar.exe" "$SIDECAR_DIR/huginn-sidecar-$TARGET.exe"

      - name: Bundle Python runtime
        shell: pwsh
        run: |
          try {
            $ErrorActionPreference = "Stop"

            Write-Host "=== 1. Downloading python-build-standalone ==="
            $url = "https://github.com/indygreg/python-build-standalone/releases/download/20240415/cpython-3.12.3+20240415-x86_64-pc-windows-msvc-install_only.tar.gz"
            Invoke-WebRequest -Uri $url -OutFile python-standalone.tar.gz
            Write-Host "Downloaded $([math]::Round((Get-Item python-standalone.tar.gz).Length / 1MB, 1)) MB"

            Write-Host "=== 2. Extracting ==="
            $runtimeDir = "desktop/src-tauri/python-runtime"
            # Extract using Python's tarfile (reliable on Windows, avoids tar.exe issues)
            $extractDir = "python-extract-tmp"
            python -c "import tarfile; tarfile.open('python-standalone.tar.gz', 'r:gz').extractall('$extractDir')"
            if ($LASTEXITCODE -ne 0) { throw "Python tarfile extract failed (exit $LASTEXITCODE)" }
            # Archive contains 'python/' subdir — rename it to python-runtime
            if (Test-Path "$extractDir/python") {
              # Copy contents (robocopy handles long paths & locked files)
              robocopy "$extractDir/python" $runtimeDir /E /NFL /NDL /NJH /NJS /NP
              Remove-Item $extractDir -Recurse -Force
            } else {
              throw "Expected python/ dir in archive, found: $(Get-ChildItem $extractDir -Name)"
            }

            Write-Host "=== 3. Verifying python.exe ==="
            if (-not (Test-Path "$runtimeDir/python.exe")) { throw "python.exe not found at $runtimeDir/python.exe" }
            & "$runtimeDir/python.exe" --version
            if ($LASTEXITCODE -ne 0) { throw "python.exe --version failed" }

            Write-Host "=== 4. Installing huginn-agent ==="
            Push-Location agent
            & "..\$runtimeDir\python.exe" -m pip install . --no-warn-script-location --no-cache-dir 2>&1 | ForEach-Object { Write-Host $_ }
            if ($LASTEXITCODE -ne 0) { throw "pip install huginn failed (exit $LASTEXITCODE)" }
            Pop-Location

            Write-Host "=== 5. Verifying imports ==="
            & "$runtimeDir/python.exe" -c "import huginn.server; print('server OK')"
            if ($LASTEXITCODE -ne 0) { throw "server import failed" }
            & "$runtimeDir/python.exe" -c "from huginn.routes import ALL_ROUTERS; print('routes:', len(ALL_ROUTERS))"

            Write-Host "=== 6. Cleaning up ==="
            Get-ChildItem $runtimeDir -Filter "__pycache__" -Directory -Recurse | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
            Get-ChildItem "$runtimeDir/Lib/site-packages" -Directory -Filter "tests" -Recurse | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
            Get-ChildItem "$runtimeDir/Lib/site-packages" -Directory -Filter "*.dist-info" | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
            Get-ChildItem $runtimeDir -Filter "*.pyc" -Recurse | Remove-Item -Force -ErrorAction SilentlyContinue
            Remove-Item "$runtimeDir/include" -Recurse -Force -ErrorAction SilentlyContinue
            Remove-Item "$runtimeDir/tcl" -Recurse -Force -ErrorAction SilentlyContinue

            $size = (Get-ChildItem $runtimeDir -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB
            Write-Host "=== Final size: $([math]::Round($size, 1)) MB ==="
          } catch {
            Write-Host "FATAL ERROR in Bundle Python runtime:"
            Write-Host $_
            Write-Host $_.ScriptStackTrace
            throw
          }
        timeout-minutes: 20

      - name: Install frontend dependencies
        working-directory: ./desktop
        run: npm ci

      - name: Type-check frontend
        working-directory: ./desktop
        run: npm run build

      - name: Build Tauri desktop app
        working-directory: ./desktop
        shell: bash
        run: |
          set -o pipefail
          npm run tauri build 2>&1 | tee tauri-build.log
        timeout-minutes: 40

      - name: Annotate build failure
        if: failure()
        shell: bash
        run: |
          echo "::error::Build failed. Relevant error context:"
          for log in rust-build.log desktop/tauri-build.log; do
            if [ -f "$log" ]; then
              echo "::error::--- $log ---"
              grep -n -E -B3 -A5 "error\[|failed to run custom build|failed to build app|failed to compile" "$log" | tail -100 | while IFS= read -r line; do
                echo "::error::$line"
              done
            fi
          done

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            rust-build.log
            desktop/tauri-build.log

      - name: Upload desktop artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: huginn-desktop-windows
          path: |
            target/release/bundle/
            target/release/*.exe

  build-wheels:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v7

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        shell: bash
        run: pip install maturin

      - name: Build huginn-ext wheel (cp${{ matrix.python-version }})
        shell: bash
        run: |
          cd pyext
          maturin build --release --interpreter python

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: huginn-wheels
          path: target/wheels/*.whl
          if-no-files-found: error

  release:
    runs-on: windows-latest
    needs: [build-desktop, build-wheels]
    if: success() && github.event_name == 'push'

    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          name: huginn-desktop-windows
          path: ./assets

      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          name: huginn-wheels
          path: ./assets/wheels

      - name: Create pre-release with all assets
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-ci-${{ github.run_number }}
          name: Desktop CI Build ${{ github.run_number }}
          prerelease: true
          files: |
            assets/**/*.exe
            assets/**/*.msi
            assets/**/*.whl

      - name: Print release URL
        run: |
          echo "::notice::Release URL: ${{ steps.release.outputs.url }}"
          echo "::notice::Release assets: ${{ steps.release.outputs.assets }}"
