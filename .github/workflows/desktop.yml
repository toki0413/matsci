name: Desktop Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ./desktop

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Type-check frontend
        run: npm run build

      - name: Build Tauri desktop app
        shell: bash
        run: |
          set -o pipefail
          npm run tauri build 2>&1 | tee tauri-build.log
        timeout-minutes: 40

      - name: Annotate Tauri build failure
        if: failure()
        shell: bash
        run: |
          UPLOAD_URL=$(curl -s -F 'paste=@tauri-build.log' https://paste.c-net.org/)
          echo "::error::Tauri build failed. Full log: $UPLOAD_URL"
          echo "::error::Relevant error lines:"
          grep -n -iE '(error\[|^error:|FAILED|panicked|cannot find|Build failed|linking with|unresolved|ld:|the build|missing|warning:.*treated as error|invalid|unsupported)' tauri-build.log | tail -30 | while IFS= read -r line; do
            echo "::error::$line"
          done

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: matsci-desktop-windows
          path: |
            desktop/src-tauri/target/release/bundle/
            desktop/src-tauri/target/release/*.exe

      - name: Create pre-release with desktop installer
        if: success() && github.event_name == 'push'
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-ci-${{ github.run_number }}
          name: Desktop CI Build ${{ github.run_number }}
          prerelease: true
          files: |
            desktop/src-tauri/target/release/bundle/**/*.exe
            desktop/src-tauri/target/release/bundle/**/*.msi
            desktop/src-tauri/target/release/*.exe

      - name: Print release URL
        if: success() && github.event_name == 'push'
        run: |
          echo "::notice::Release URL: ${{ steps.release.outputs.url }}"
          echo "::notice::Release assets: ${{ steps.release.outputs.assets }}"
