name: Desktop Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0

jobs:
  build-desktop:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./desktop/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust CLI + sidecar
        shell: bash
        run: |
          set -o pipefail
          cargo build --release -p huginn -p huginn-sidecar 2>&1 | tee rust-build.log

      - name: Detect Rust target triple
        id: target
        shell: bash
        run: |
          TARGET=$(rustc --print host-tuple)
          echo "triple=$TARGET" >> "$GITHUB_OUTPUT"

      - name: Stage huginn sidecars
        shell: bash
        run: |
          TARGET=${{ steps.target.outputs.triple }}
          SIDECAR_DIR="desktop/src-tauri/sidecars"
          mkdir -p "$SIDECAR_DIR"
          cp "target/release/huginn.exe" "$SIDECAR_DIR/huginn-$TARGET.exe"
          cp "target/release/huginn-sidecar.exe" "$SIDECAR_DIR/huginn-sidecar-$TARGET.exe"

      - name: Bundle Python runtime
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $pyVer = "3.12.3"
          $url = "https://www.python.org/ftp/python/$pyVer/python-$pyVer-embed-amd64.zip"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile python-embed.zip

          # Extract embeddable Python
          $runtimeDir = "desktop/src-tauri/python-runtime"
          New-Item -ItemType Directory -Force -Path $runtimeDir | Out-Null
          Expand-Archive -Path python-embed.zip -DestinationPath $runtimeDir -Force

          # Enable site-packages
          $pthFile = Get-ChildItem "$runtimeDir/python*._pth" | Select-Object -First 1
          $content = (Get-Content $pthFile.FullName -Raw) -replace '#import site', 'import site'
          Set-Content $pthFile.FullName $content

          # Use the CI-installed Python (3.11) to install packages into the
          # embeddable runtime's site-packages via --target.
          # This avoids get-pip.py issues with embeddable Python.
          $embedSitePackages = "$runtimeDir/Lib/site-packages"
          New-Item -ItemType Directory -Force -Path $embedSitePackages | Out-Null

          # Install huginn-agent + core deps into the target dir
          Push-Location agent
          python -m pip install . --no-warn-script-location --no-cache-dir --target $embedSitePackages
          if ($LASTEXITCODE -ne 0) { throw "huginn install failed" }
          Pop-Location

          # Clean caches/tests to reduce size
          Get-ChildItem $embedSitePackages -Directory -Filter "tests" -Recurse | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          Get-ChildItem $runtimeDir -Filter "__pycache__" -Directory -Recurse | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          Get-ChildItem $runtimeDir -Filter "*.pyc" -Recurse | Remove-Item -Force -ErrorAction SilentlyContinue

          # Verify with the embeddable python.exe
          & "$runtimeDir/python.exe" -c "import huginn; print('huginn OK:', huginn.__file__)"
          if ($LASTEXITCODE -ne 0) { throw "huginn import failed" }
          & "$runtimeDir/python.exe" -c "import pydantic, langchain, langgraph; print('deps OK')"
          if ($LASTEXITCODE -ne 0) { throw "deps import failed" }

          $size = (Get-ChildItem $runtimeDir -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host "Python runtime size: $([math]::Round($size, 1)) MB"
        timeout-minutes: 15

      - name: Install frontend dependencies
        working-directory: ./desktop
        run: npm ci

      - name: Type-check frontend
        working-directory: ./desktop
        run: npm run build

      - name: Build Tauri desktop app
        working-directory: ./desktop
        shell: bash
        run: |
          set -o pipefail
          npm run tauri build 2>&1 | tee tauri-build.log
        timeout-minutes: 40

      - name: Annotate build failure
        if: failure()
        shell: bash
        run: |
          echo "::error::Build failed. Relevant error context:"
          for log in rust-build.log desktop/tauri-build.log; do
            if [ -f "$log" ]; then
              echo "::error::--- $log ---"
              grep -n -E -B3 -A5 "error\[|failed to run custom build|failed to build app|failed to compile" "$log" | tail -100 | while IFS= read -r line; do
                echo "::error::$line"
              done
            fi
          done

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            rust-build.log
            desktop/tauri-build.log

      - name: Upload desktop artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: huginn-desktop-windows
          path: |
            target/release/bundle/
            target/release/*.exe

  build-wheels:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        shell: bash
        run: pip install maturin

      - name: Build huginn-ext wheel (cp${{ matrix.python-version }})
        shell: bash
        run: |
          cd pyext
          maturin build --release --interpreter python

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: huginn-wheels
          path: target/wheels/*.whl
          if-no-files-found: error

  release:
    runs-on: windows-latest
    needs: [build-desktop, build-wheels]
    if: success() && github.event_name == 'push'

    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          name: huginn-desktop-windows
          path: ./assets

      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          name: huginn-wheels
          path: ./assets/wheels

      - name: Create pre-release with all assets
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-ci-${{ github.run_number }}
          name: Desktop CI Build ${{ github.run_number }}
          prerelease: true
          files: |
            assets/**/*.exe
            assets/**/*.msi
            assets/**/*.whl

      - name: Print release URL
        run: |
          echo "::notice::Release URL: ${{ steps.release.outputs.url }}"
          echo "::notice::Release assets: ${{ steps.release.outputs.assets }}"
