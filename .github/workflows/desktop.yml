name: Desktop Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-desktop:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ./desktop

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Type-check frontend
        run: npm run build

      - name: Build Tauri desktop app
        shell: bash
        run: |
          set -o pipefail
          npm run tauri build 2>&1 | tee tauri-build.log
        timeout-minutes: 40

      - name: Annotate Tauri build failure
        if: failure()
        shell: bash
        run: |
          echo "::error::Tauri build failed. Relevant error lines:"
          grep -n -E '(^error|FAILED|panicked|cannot find|Build failed|linking with|unresolved|ld:)' tauri-build.log | tail -20 | while IFS= read -r line; do
            echo "::error::$line"
          done
          echo "::error::--- tail of log ---"
          tail -30 tauri-build.log | sed 's/\x1b\[[0-9;]*m//g' | while IFS= read -r line; do
            echo "::error::$line"
          done

      - name: Upload Tauri build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-log
          path: desktop/tauri-build.log
          retention-days: 3

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: matsci-desktop-windows
          path: |
            desktop/src-tauri/target/release/bundle/
            desktop/src-tauri/target/release/*.exe
